name: Deploy to dragonboat-api

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Checkout dragonboat-api
        uses: actions/checkout@v4
        with:
          repository: tranda/dragonboat-api
          token: ${{ secrets.API_REPO_TOKEN }}
          path: api-repo

      - name: Copy build to api-repo/public
        run: |
          rm -rf api-repo/public/assets
          cp -r dist/assets api-repo/public/
          cp dist/index.html api-repo/public/
          cp dist/favicon.svg api-repo/public/
          cp dist/icons.svg api-repo/public/

      - name: Commit and push
        run: |
          cd api-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update frontend build"
          git push
